<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0A0A0A" rx="60"/>

  <!-- Outer white Arch-style triangle -->
  <polygon points="256,60 470,430 42,430" fill="#FFFFFF"/>

  <!-- Dark inner cutout -->
  <polygon points="256,230 340,400 172,400" fill="#0A0A0A"/>

  <!-- Red left slash -->
  <line x1="168" y1="210" x2="218" y2="290" stroke="#FF3C3C" stroke-width="14" stroke-linecap="round"/>

  <!-- Red right slash -->
  <line x1="344" y1="210" x2="294" y2="290" stroke="#FF3C3C" stroke-width="14" stroke-linecap="round"/>

  <!-- App name below -->
  <text x="256" y="482" text-anchor="middle"
        font-family="monospace" font-size="34" font-weight="bold"
        fill="#FF3C3C" letter-spacing="6">Terminal-0</text>
</svg>
